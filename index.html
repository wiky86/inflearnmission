<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - AI 점심 메뉴 추천</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E5551F;
            --secondary: #FFD166;
            --accent: #06D6A0;
            --dark: #1A1A2E;
            --darker: #16213E;
            --light: #FFF8F0;
            --card-bg: #FFFFFF;
            --text: #2D2D2D;
            --text-light: #6B7280;
            --shadow: 0 8px 32px rgba(255, 107, 53, 0.15);
            --shadow-lg: 0 16px 48px rgba(255, 107, 53, 0.2);
            --radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--light);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #FF8C61 50%, var(--secondary) 100%);
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 60px;
            background: var(--light);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
        }

        .header-deco {
            position: absolute;
            font-size: 80px;
            opacity: 0.15;
            animation: float 6s ease-in-out infinite;
        }

        .header-deco:nth-child(1) { top: 20px; left: 5%; animation-delay: 0s; }
        .header-deco:nth-child(2) { top: 60px; right: 8%; animation-delay: 1.5s; }
        .header-deco:nth-child(3) { bottom: 80px; left: 15%; animation-delay: 3s; }
        .header-deco:nth-child(4) { top: 30px; left: 45%; animation-delay: 0.8s; font-size: 60px; }
        .header-deco:nth-child(5) { bottom: 100px; right: 20%; animation-delay: 2.2s; font-size: 50px; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .header-content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px 20px 80px;
        }

        .logo {
            font-family: 'Noto Sans KR', sans-serif;
            font-weight: 800;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            color: #fff;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            margin-bottom: 8px;
            letter-spacing: -2px;
        }

        .logo span {
            display: inline-block;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0% { transform: translateY(-30px); opacity: 0; }
            60% { transform: translateY(5px); }
            100% { transform: translateY(0); opacity: 1; }
        }

        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 0 20px;
            margin-top: -30px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }

        .nav-pill {
            background: var(--card-bg);
            border: 2px solid transparent;
            padding: 10px 22px;
            border-radius: 50px;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            white-space: nowrap;
        }

        .nav-pill:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .nav-pill.active {
            background: var(--primary);
            color: #fff;
            box-shadow: var(--shadow);
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .preference-section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .preference-section h2 {
            font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }

        .tag-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            padding: 10px 18px;
            border-radius: 12px;
            border: 2px solid #E5E7EB;
            background: transparent;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
            user-select: none;
        }

        .tag:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.04);
        }

        .tag.selected {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.08);
            color: var(--primary);
            font-weight: 500;
        }

        .generate-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            margin-bottom: 32px;
        }

        .generate-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .generate-btn:hover::before { left: 100%; }
        .generate-btn:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
        .generate-btn:active { transform: translateY(0); }
        .generate-btn.loading { pointer-events: none; opacity: 0.85; }

        .result-container { display: none; }
        .result-container.show { display: block; animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.04);
        }

        .result-header {
            background: linear-gradient(135deg, var(--dark), var(--darker));
            padding: 28px 32px;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        .result-header::after {
            content: '';
            position: absolute;
            top: -50%; right: -30%;
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.2), transparent);
            border-radius: 50%;
        }

        .result-badge {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 4px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .result-menu-name {
            font-family: 'Noto Sans KR', sans-serif; font-weight: 700;
            font-size: clamp(2rem, 5vw, 2.8rem);
            letter-spacing: -1px;
            position: relative;
            z-index: 1;
        }

        .result-menu-emoji { font-size: 2.5rem; margin-left: 8px; }

        .result-body { padding: 28px 32px; }

        .result-desc {
            font-size: 1.05rem;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 24px;
        }

        .result-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .meta-item {
            background: var(--light);
            padding: 16px;
            border-radius: 14px;
            text-align: center;
        }

        .meta-label {
            font-size: 0.75rem;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .meta-value { font-size: 1.15rem; font-weight: 700; color: var(--text); }

        .result-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }

        .result-tag {
            background: rgba(6, 214, 160, 0.1);
            color: #059669;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .result-tip {
            background: linear-gradient(135deg, rgba(255, 209, 102, 0.15), rgba(255, 107, 53, 0.08));
            border-left: 4px solid var(--secondary);
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.6;
        }

        .result-tip strong { color: var(--primary); }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #F3F4F6;
        }

        .action-btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid #E5E7EB;
            background: transparent;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .action-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(255, 107, 53, 0.04); }

        .action-btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
        .action-btn.primary:hover { background: var(--primary-dark); border-color: var(--primary-dark); color: #fff; transform: translateY(-2px); box-shadow: var(--shadow); }

        .history-section { margin-top: 48px; }
        .history-section h3 { font-family: 'Noto Sans KR', sans-serif; font-weight: 700; font-size: 1.2rem; margin-bottom: 16px; color: var(--text-light); }
        .history-list { display: flex; flex-direction: column; gap: 8px; }

        .history-item {
            display: flex; align-items: center; justify-content: space-between;
            background: var(--card-bg); padding: 14px 20px; border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.04); font-size: 0.9rem; transition: all 0.2s ease;
        }
        .history-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .history-item-name { font-weight: 500; }
        .history-item-date { color: var(--text-light); font-size: 0.8rem; }

        footer {
            text-align: center; padding: 40px 20px; color: var(--text-light); font-size: 0.85rem;
        }
        footer a { color: var(--primary); text-decoration: none; font-weight: 500; }

        .spinner {
            display: inline-block; width: 24px; height: 24px;
            border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .confetti-piece {
            position: fixed; z-index: 10000; pointer-events: none;
            animation: confettiFall 2s ease-in forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 600px) {
            .header-content { padding: 40px 16px 60px; }
            .header-deco { font-size: 50px; }
            .preference-section { padding: 24px 20px; }
            .result-header { padding: 24px 20px; }
            .result-body { padding: 24px 20px; }
            .action-buttons { flex-direction: column; }
            nav { gap: 6px; }
            .nav-pill { padding: 8px 16px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

<header>

<nav>

<main>

            <button class="tag" data-value="special">특별하게</button>
        </div>
    </div>

    <div class="preference-section">
        <h2>💰 예산</h2>
        <div class="tag-group" id="budgetTags">
            <button class="tag" data-value="cheap">~8,000원</button>
            <button class="tag" data-value="mid">8,000~15,000원</button>
            <button class="tag" data-value="high">15,000원~</button>
            <button class="tag" data-value="any">상관없음</button>

    <div class="preference-section">

            <button class="tag" data-value="colleague">동료와</button>
            <button class="tag" data-value="date">연인과</button>
            <button class="tag" data-value="group">단체 (4인+)</button>
        </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="recommend()">
        🎰 메뉴 뽑기!
    </button>

    <div class="result-container" id="resultContainer">
        <div class="result-card">
            <div class="result-header">

                <div class="result-meta" id="resultMeta"></div>
                <div class="result-tags" id="resultTags"></div>
                <div class="result-tip" id="resultTip"></div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="recommend()">🔄 다시 뽑기</button>
                    <button class="action-btn" onclick="saveHistory()">💾 저장</button>
                    <button class="action-btn primary" onclick="shareResult()">📤 공유하기</button>
                </div>
            </div>
        </div>
    </div>

    <div class="history-section" id="historySection" style="display:none;">
        <h3>📋 최근 추천 기록</h3>
        <div class="history-list" id="historyList"></div>
    </div>
</main>

<footer>
    <p>만든 사람: 인프런 수강생 · 비개발자 4주 만에 수익화 서비스 만들기</p>
    <p style="margin-top:6px;">© 2026 오늘 뭐 먹지? · All rights reserved</p>
</footer>

let currentMeal = 'lunch';
let selectedMood = null;
let selectedBudget = null;
let selectedPeople = null;
let lastResult = null;
let history = [];

document.querySelectorAll('.nav-pill').forEach(pill => {
    pill.addEventListener('click', () => {
        document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        currentMeal = pill.dataset.meal;
    });
});

function setupTagGroup(groupId, setter) {
    document.querySelectorAll(`#${groupId} .tag`).forEach(tag => {
        tag.addEventListener('click', () => {
            document.querySelectorAll(`#${groupId} .tag`).forEach(t => t.classList.remove('selected'));
            tag.classList.add('selected');
            setter(tag.dataset.value);
        });
    });
}

setupTagGroup('moodTags', v => selectedMood = v);
setupTagGroup('budgetTags', v => selectedBudget = v);
setupTagGroup('peopleTags', v => selectedPeople = v);

function recommend() {
    const btn = document.getElementById('generateBtn');
    const mood = selectedMood || ['hearty','light','spicy','comfort','cool','special'][Math.floor(Math.random()*6)];
    const mealData = menuDB[currentMeal];
    const moodOptions = mealData[mood] || mealData['hearty'];
    let candidates = [...moodOptions];
    const pick = candidates[Math.floor(Math.random() * candidates.length)];

    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner"></span> 고민 중...';

    setTimeout(() => {
        btn.classList.remove('loading');
        btn.innerHTML = '🎰 메뉴 뽑기!';
        showResult(pick);
        launchConfetti();
    }, 1200);
}

function showResult(menu) {
    lastResult = menu;
    const container = document.getElementById('resultContainer');
    const mealLabels = { lunch: '점심 추천', dinner: '저녁 추천', snack: '간식 추천', late: '야식 추천' };

    document.getElementById('resultBadge').textContent = mealLabels[currentMeal] || 'AI 추천';
    document.getElementById('resultName').textContent = menu.name;
    document.getElementById('resultEmoji').textContent = menu.emoji;
    document.getElementById('resultDesc').textContent = menu.desc;

    document.getElementById('resultMeta').innerHTML = `
        <div class="meta-item"><div class="meta-label">예상 가격</div><div class="meta-value">${menu.price}</div></div>
        <div class="meta-item"><div class="meta-label">칼로리</div><div class="meta-value">${menu.cal}</div></div>
        <div class="meta-item"><div class="meta-label">예상 소요</div><div class="meta-value">${menu.time}</div></div>
    `;

    document.getElementById('resultTags').innerHTML = menu.tags.map(t => `<span class="result-tag">#${t}</span>`).join('');
    document.getElementById('resultTip').innerHTML = menu.tip;

    container.classList.remove('show');
    void container.offsetWidth;
    container.classList.add('show');
    container.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function launchConfetti() {
    const colors = ['#FF6B35','#FFD166','#06D6A0','#118AB2','#EF476F'];
    for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.width = (Math.random() * 8 + 4) + 'px';
        piece.style.height = (Math.random() * 8 + 4) + 'px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 3000);
    }
}

function saveHistory() {
    if (!lastResult) return;
    const now = new Date();
    const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    history.unshift({ name: lastResult.name, emoji: lastResult.emoji, date: timeStr });
    if (history.length > 10) history.pop();
    renderHistory();
    const btn = event.target;
    const original = btn.textContent;
    btn.textContent = '✅ 저장됨!';
    setTimeout(() => btn.textContent = original, 1200);
}

function renderHistory() {
    const section = document.getElementById('historySection');
    const list = document.getElementById('historyList');
    if (history.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    list.innerHTML = history.map(h =>
        `<div class="history-item"><span class="history-item-name">${h.emoji} ${h.name}</span><span class="history-item-date">${h.date}</span></div>`
    ).join('');
}

function shareResult() {
    if (!lastResult) return;
    const text = `🍽️ 오늘의 추천 메뉴: ${lastResult.emoji} ${lastResult.name}\n${lastResult.desc}\n\n👉 나도 추천받기: ${window.location.href}`;
    if (navigator.share) {
        navigator.share({ title: '오늘 뭐 먹지?', text: text }).catch(() => {});
    } else {
        navigator.clipboard.writeText(text).then(() => {
            alert('클립보드에 복사되었습니다! 친구에게 공유해 보세요 😄');
        }).catch(() => {
            prompt('아래 텍스트를 복사해서 공유하세요:', text);
        });
    }
}

window.addEventListener('DOMContentLoaded', () => {
    const logo = document.querySelector('.logo');
    const chars = logo.textContent.split('');
    logo.innerHTML = chars.map((c, i) =>
        `<span style="animation-delay:${i * 0.06}s">${c === ' ' ? '&nbsp;' : c}</span>`
    ).join('');
});
</script>
</body>
